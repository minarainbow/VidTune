<svg width="400" height="250" viewBox="0 0 400 250" xmlns="http://www.w3.org/2000/svg" shape-rendering="geometricPrecision">
  <defs>
    <mask id="hole" maskUnits="userSpaceOnUse">
      <!-- visible area (white = show overlay) -->
      <rect x="0" y="0" width="400" height="250" fill="white"/>
      <!-- hole (black = transparent) — rx/ry=16 for slightly sharper rounded corners -->
      <rect x="140" y="65" width="120" height="120" rx="16" ry="16" fill="black"/>
    </mask>
  </defs>

  <!-- White overlay with transparent hole punched out -->
  <rect x="0" y="0" width="400" height="250" fill="white" mask="url(#hole)"/>
</svg>
